<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>molotov ‚ÄĒ terminal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#00ff41;font-family:'Fira Code','JetBrains Mono','Cascadia Code','Consolas',monospace;font-size:15px;line-height:1.35;height:100vh;overflow:hidden}
#term{width:100%;height:100vh;padding:18px 22px;display:flex;flex-direction:column}
#output{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#00ff41 #0a0a0a}
#output::-webkit-scrollbar{width:6px}
#output::-webkit-scrollbar-thumb{background:#00ff41;border-radius:3px}
#output::-webkit-scrollbar-track{background:#0a0a0a}
.line{white-space:pre-wrap;word-break:break-all;min-height:1.35em}
.prompt-line{display:flex;align-items:center}
.prompt{color:#00ff41;user-select:none;white-space:pre}
#input-field{background:transparent;border:none;color:#00ff41;font:inherit;outline:none;flex:1;caret-color:#00ff41}
::selection{background:#00ff41;color:#0a0a0a}
.ascii{color:#00cc33;white-space:pre;line-height:1.1;font-size:13px}
.info{color:#00aa33}
.dim{color:#007a22}
.cmd{color:#00ff41;font-weight:bold}
.err{color:#ff4444}
.bomb{font-size:60px;text-align:center;padding:40px 0;animation:pulse 0.8s ease-in-out infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.3)}}
.explosion{font-size:80px;text-align:center;padding:60px 0;animation:shake 0.1s ease-in-out infinite}
@keyframes shake{0%{transform:translate(0,0)}25%{transform:translate(-6px,4px)}50%{transform:translate(6px,-4px)}75%{transform:translate(-4px,-2px)}100%{transform:translate(4px,2px)}}
.question-mark{color:#00ff41;animation:blink 0.1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.yellow{color:#ffff00}
.blue{color:#4488ff}
.pink{color:#ff44aa}
.hidden{display:none}
</style>
</head>
<body>
<div id="term">
<div id="output"></div>
<div class="prompt-line">
<span class="prompt">‚ĚĮ </span>
<input id="input-field" type="text" spellcheck="false" autofocus>

</div>

function scrollBottom() {
  requestAnimationFrame(() => { output.scrollTop = output.scrollHeight; });
}

function writeLine(html, cls = '') {
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.innerHTML = html;
  output.appendChild(div);
  scrollBottom();
}

function writeRaw(text) {
  const div = document.createElement('div');
  div.className = 'line';
  div.textContent = text;
  output.appendChild(div);
  scrollBottom();
}

function clearScreen() {
  output.innerHTML = '';
  scrollBottom();
}

  setTimeout(() => {

function processCommand(cmd) {
  const trimmed = cmd.trim();
  const lower = trimmed.toLowerCase();
  if (!trimmed) return;

  history.push(trimmed);
  histIdx = history.length;

  writeRaw('‚ĚĮ ' + trimmed);

  if (questionMarksActive) return;

  const args = trimmed.split(/\s+/);
  const main = args[0].toLowerCase();

  switch (main) {
    case 'molotov':
      if (args[1] === '--version' || args[1] === '-v') {
        showVersion();
      } else if (args[1] === '--download' || args[1] === '-d') {
        showDownload();
      } else {
        showBrand();
      }
      break;

    case 'motolov':
      triggerQuestionMarks();
      break;

    case 'python':
      writeLine('<span class="info">I mean, it is, but it isn\'t.</span>');
      break;

    case 'molotovmolotovmolotov':
      triggerBomb();
      break;

    case 'help':
    case '--help':
      showHelp();
      break;

    case 'clear':
      clearScreen();
      break;

    case 'whoami':
      writeLine('<span class="info">You are a pioneer. ūüöÄ</span>');
      break;

    case 'sudo':
      writeLine('<span class="err">Nice try. Molotov doesn\'t need sudo.</span>');
      break;

    case 'rm':
    case 'rmdir':
      if (args.includes('-rf') && args.includes('/')) {
        writeLine('<span class="err">Whoa there, this isn\'t Linux.</span>');
      } else {
        writeLine('<span class="err">rm: missing operand</span>');
      }
      break;

    case 'exit':
      writeLine('<span class="info">Use the GUI like a normal person. ūüėČ</span>');
      break;

    case '42':
      writeLine('<span class="info">The answer to the ultimate question of life, the universe, and everything.</span>');
      break;

    case 'coffee':
    case 'brew':
      writeLine('<span class="info">brew install coffee... just kidding, go make some ‚ėē</span>');
      break;

    case 'rust':
    case 'rustc':
      writeLine('<span class="info">ūü¶Ä The secret ingredient. Ferris approves.</span>');
      break;

    case 'vim':
      writeLine('<span class="info">:q to exit. Oh wait, you can\'t. ūüėĄ</span>');
      break;

    case 'emacs':
      writeLine('<span class="info">Which is just vim with extra keys. Discuss.</span>');
      break;

    case 'node':
    case 'npm':
      writeLine('<span class="info">Wrong neighborhood, friend.</span>');
      break;

    case 'c++':
    case 'c':
      writeLine('<span class="info">We don\'t do pointers here.</span>');
      break;

    case 'java':
      writeLine('<span class="info">Too many keystrokes. Next.</span>');
      break;

    case 'javascript':
      writeLine('<span class="err">== vs === is a personality test</span>');
      break;

    case 'goto':
      writeLine('<span class="info">Considered harmful. ‚ÄĒ Dijkstra</span>');
      break;

    case 'fortran':
      writeLine('<span class="info">Found the grandparent.</span>');
      break;

    case 'lisp':
      writeLine('<span class="info">(print (quote (too many parens)))</span>');
      break;

    case 'brainfuck':
      writeLine('<span class="info">++++++++[&gt;++++[&gt;++&gt;+++&gt;+++&gt;+&lt;&lt;&lt;&lt;-]&gt;+&gt;+&gt;-&gt;&gt;+[&lt;]&lt;-]&gt;&gt;.&gt;---.+++++++..+++.&gt;&gt;.&lt;-.&lt;.+++.------.--------.&gt;&gt;+.&gt;++.</span>');
      break;

    case 'snake':

      break;

    case 'ferris':
    case 'crab':

      break;

    case 'recursion':

      break;

    case '0':
      writeLine('<span class="info">false</span>');
      break;

    case '1':
      writeLine('<span class="info">true</span>');
      break;

    case 'true':
      writeLine('<span class="info">1</span>');
      break;

    case 'false':
      writeLine('<span class="info">0</span>');
      break;

    case 'ai':
      writeLine('<span class="err">I can\'t help you with that right now.</span>');
      break;

    case 'no':
      writeLine('<span class="info">yes</span>');
      break;

    case 'yes':
      writeLine('<span class="info">no</span>');
      break;

    case 'maybe':
      writeLine('<span class="info">Schr√∂dinger\'s command.</span>');
      break;

    case 'pull':

      break;

    case 'get':
    case 'post':
      writeLine('<span class="err">this is not an api omg</span>');

    case 'version':
    case '-v':
    case '--v':
      showVersion();
      break;

    case 'download':
    case '-d':

      showDownload();
      break;

    default:
      writeLine('<span class="err">command not found: ' + trimmed.split(/\s+/)[0] + '</span>');
      break;
  }
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const cmd = input.value;
    input.value = '';
    if (!questionMarksActive) {
      processCommand(cmd);
    }
    scrollBottom();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (history.length === 0) return;
    histIdx = Math.max(0, histIdx - 1);
    input.value = history[histIdx];
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx >= history.length - 1) {
      histIdx = history.length;
      input.value = '';
    } else {
      histIdx = Math.min(history.length - 1, histIdx + 1);
      input.value = history[histIdx];
    }
  }
});

// Hide cursor from prompt when input is blurred
input.addEventListener('blur', () => { setTimeout(() => input.focus(), 10); });
document.addEventListener('click', () => input.focus());

showBrand();
input.focus();
