name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mltv
            archive: mltv-linux-x86_64.tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mltv
            archive: mltv-linux-arm64.tar.gz

          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: mltv.exe
            archive: mltv-windows-x86_64.zip

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: mltv
            archive: mltv-macos-x86_64.tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: mltv
            archive: mltv-macos-arm64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross-compile tools (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (tar.gz)
        if: "!endsWith(matrix.archive, '.zip')"
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} mltv
          tar -czf ${{ matrix.archive }} mltv README.md
          rm mltv

      - name: Package (zip)
        if: endsWith(matrix.archive, '.zip')
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} mltv.exe
          zip ${{ matrix.archive }} mltv.exe README.md
          rm mltv.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "mltv ${{ github.ref_name }}"
          body: |
            ## Molotov ${{ github.ref_name }}

            Python-easy syntax. Rust-speed performance.

            ### Install

            **Linux / macOS**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/jzadl/molotov/main/install.sh | sh
            ```

            **Windows**
            ```powershell
            irm https://raw.githubusercontent.com/jzadl/molotov/main/install.ps1 | iex
            ```

            ### Binaries
            | Platform | Download |
            |----------|----------|
            | Linux x86_64 | `mltv-linux-x86_64.tar.gz` |
            | Linux ARM64 | `mltv-linux-arm64.tar.gz` |
            | macOS x86_64 | `mltv-macos-x86_64.tar.gz` |
            | macOS ARM64 (M1/M2/M3) | `mltv-macos-arm64.tar.gz` |
            | Windows x86_64 | `mltv-windows-x86_64.zip` |
          files: artifacts/*
          draft: false
          prerelease: false
