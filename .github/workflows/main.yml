name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux targets
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mltv
            archive: mltv-linux-x86_64.tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mltv
            archive: mltv-linux-arm64.tar.gz

          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mltv
            archive: mltv-linux-i686.tar.gz

          # macOS targets
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: mltv
            archive: mltv-macos-x86_64.tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: mltv
            archive: mltv-macos-arm64.tar.gz

          # Windows targets (native)
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: mltv.exe
            archive: mltv-windows-x86_64.zip

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: mltv.exe
            archive: mltv-windows-arm64.zip

          - target: i686-pc-windows-msvc
            os: windows-latest
            artifact: mltv.exe
            archive: mltv-windows-i686.zip

          # Windows targets (cross-compile from Linux)
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: mltv.exe
            archive: mltv-windows-x86_64-gnu.zip

          # FreeBSD target
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
            artifact: mltv
            archive: mltv-freebsd-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Linux cross-compile tools ──────────────────────────────

      - name: Install cross-compile tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross-compile tools (Linux i686)
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: Install cross-compile tools (Windows x86_64 from Linux)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      # ── FreeBSD: use zigbuild (needs no sysroot) ───────────────

      - name: Install cargo-zigbuild (FreeBSD)
        if: matrix.target == 'x86_64-unknown-freebsd'
        run: |
          pip install cargo-zigbuild

      # ── Windows MSVC ARM64/i686: use xwin (provides CRT/libs) ──

      - name: Install cargo-xwin (Windows cross)
        if: matrix.target == 'aarch64-pc-windows-msvc' || matrix.target == 'i686-pc-windows-msvc'
        run: |
          cargo install cargo-xwin

      # ── Build ──────────────────────────────────────────────────

      - name: Build (zigbuild)
        if: matrix.target == 'x86_64-unknown-freebsd'
        run: cargo zigbuild --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build (xwin)
        if: matrix.target == 'aarch64-pc-windows-msvc' || matrix.target == 'i686-pc-windows-msvc'
        run: cargo xwin build --release --target ${{ matrix.target }}

      - name: Build (standard)
        if: matrix.target != 'x86_64-unknown-freebsd' && matrix.target != 'aarch64-pc-windows-msvc' && matrix.target != 'i686-pc-windows-msvc'
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      # ── Package ────────────────────────────────────────────────

      - name: Package (tar.gz)
        if: "!endsWith(matrix.archive, '.zip')"
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} mltv
          if [ -f "docs/README.md" ]; then
            tar -czf ${{ matrix.archive }} mltv docs/README.md
          else
            tar -czf ${{ matrix.archive }} mltv
          fi
          rm mltv
        shell: bash

      - name: Package (zip)
        if: endsWith(matrix.archive, '.zip')
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} mltv.exe
          if [ -f "docs/README.md" ]; then
            zip ${{ matrix.archive }} mltv.exe docs/README.md
          else
            zip ${{ matrix.archive }} mltv.exe
          fi
          rm mltv.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "mltv ${{ github.ref_name }}"
          body: |
            ## Molotov ${{ github.ref_name }}

            Python-easy syntax. Rust-speed performance.

            ### Install

            **Linux / macOS**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/jzadl/molotov/main/install.sh | sh
            ```

            **Windows**
            ```powershell
            irm https://raw.githubusercontent.com/jzadl/molotov/main/install.ps1 | iex
            ```

            **BSD**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/jzadl/molotov/main/install.sh | sh
            ```

            ### Binaries
            | Platform | Download |
            |----------|----------|
            | Linux x86_64 | `mltv-linux-x86_64.tar.gz` |
            | Linux ARM64 | `mltv-linux-arm64.tar.gz` |
            | Linux i686 | `mltv-linux-i686.tar.gz` |
            | macOS x86_64 | `mltv-macos-x86_64.tar.gz` |
            | macOS ARM64 (M1/M2/M3) | `mltv-macos-arm64.tar.gz` |
            | Windows x86_64 (MSVC) | `mltv-windows-x86_64.zip` |
            | Windows ARM64 (MSVC) | `mltv-windows-arm64.zip` |
            | Windows i686 (MSVC) | `mltv-windows-i686.zip` |
            | Windows x86_64 (GNU) | `mltv-windows-x86_64-gnu.zip` |
            | FreeBSD x86_64 | `mltv-freebsd-x86_64.tar.gz` |
          files: artifacts/*
          draft: false
          prerelease: false
